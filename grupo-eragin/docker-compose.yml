services:
  eragin-db:
    image: postgres:16
    container_name: eragin-db
    restart: always
    environment:
      POSTGRES_USER: eragin_user
      POSTGRES_PASSWORD: eragin_pass
      POSTGRES_DB: eragin_db
    ports:
      - "5432:5432"
    volumes:
      - eragin_postgres_data:/var/lib/postgresql/data

  eragin-pgadmin:
    image: dpage/pgadmin4
    container_name: eragin-pgadmin
    restart: always
    ports:
      - "5050:80"
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@eragin.com
      PGADMIN_DEFAULT_PASSWORD: eragin_admin_pass
    depends_on:
      - eragin-db

volumes:
  eragin_postgres_data: